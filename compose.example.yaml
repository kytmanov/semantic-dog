services:
  semanticdog:
    image: ghcr.io/kytmanov/semantic-dog:latest
    container_name: semanticdog
    restart: unless-stopped
    # Uncomment and adjust if your NAS bind mounts require a specific uid:gid.
    # user: "1000:1000"
    ports:
      - "8181:8181"
    environment:
      TZ: Europe/Berlin
    volumes:
      - semanticdog-config:/data/config
      - semanticdog-state:/data/state
      - semanticdog-logs:/data/logs
      - /volume1/photos:/library/photos:ro
      - /volume1/documents:/library/documents:ro

volumes:
  semanticdog-config:
  semanticdog-state:
  semanticdog-logs:
