name: Release

on:
  push:
    tags:
      - "v*"

# Prevent two releases running in parallel (e.g. two tags pushed in quick succession).
# Never cancel in-progress — a partial release is worse than a queued one.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write       # create GitHub release
  id-token: write       # PyPI trusted publishing (OIDC — no token needed)

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --tb=short -q

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel and sdist
        run: uv build

      - name: Check package version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(uv run python -c "import semanticdog; print(semanticdog.__version__)" 2>/dev/null \
                || grep '^version' pyproject.toml | head -1 | sed 's/.*= *"//' | sed 's/".*//')
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match package version $PKG"
            echo "Bump version in pyproject.toml before tagging."
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi   # optional: gate releases on a GitHub environment approval

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no PYPI_TOKEN needed.
        # One-time setup on PyPI: https://docs.pypi.org/trusted-publishers/adding-a-publisher/
        #   Publisher: GitHub Actions
        #   Owner: kytmanov
        #   Repository: semantic-dog
        #   Workflow: release.yml

  github-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true   # auto-generates from merged PR titles
          make_latest: true
